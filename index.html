<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YUSD Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1 class="logo">YT</h1>
      <h2 class="subtitle">YORLECM EXPRESS TRUST</h2>
      <h3 class="subtitle-small">DECENTRALIZED<br>FINANCIAL<br>INSTITUTION</h3>

      <form id="loginForm">
        <input type="text" id="savingsId" name="savingsId" placeholder="Savings ID" required />
        <input type="password" id="phone" name="phone" placeholder="Phone Number" required />
        <button type="submit">LOGIN</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
