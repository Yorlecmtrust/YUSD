<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YUSD Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <div class="login-container" id="loginPage">
    <img src="YT_Logo.png" alt="Logo" class="logo" />
    <h2>Login</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="phone" placeholder="Phone Number" required />
      <button type="submit">Login</button>
    </form>
  </div>

  <div id="dashboard" class="dashboard-container hidden">
    <nav>
      <a href="#">Dashboard</a>
      <a href="#">Wallets</a>
      <a href="#">Transactions</a>
    </nav>
    <div class="container">
      <h1>Welcome to YUSD Dashboard</h1>
      <div class="clock" id="clock"></div>
      <p><strong>LoanDisk Savings Balance:</strong> $<span id="loandiskBalance">0.00</span></p>
      <p><strong>YUSD Price:</strong> <span id="priceUSD">$1.00</span></p>

      <form id="transactionForm">
        <input type="text" id="wallet" placeholder="Recipient Wallet Address" required />
        <input type="number" id="amount" placeholder="USD Amount" required />
        <button type="submit">Mint YUSD</button>
      </form>

      <div id="status" class="hidden">
        <p><strong>Status:</strong> <span id="result"></span></p>
        <button id="anotherBtn">Make Another Transaction</button>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>
</body>
</html>
