<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yorlecm YUSD Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="login-panel" id="loginPanel">
      <div class="logo">YT</div>
      <h2>Decentralized Financial Institution</h2>
      <h3>Login to YUSD Dashboard</h3>
      <input type="number" id="savingsId" placeholder="Savings ID" required />
      <input type="password" id="phone" placeholder="Phone Number (optional)" />
      <button onclick="login()">LOGIN</button>
    </div>

    <div class="dashboard" id="dashboard" style="display:none;">
      <div class="header">
        <h2>Dashboard</h2>
      </div>

      <div class="stats">
        <div class="card">
          <h4>YET Balance</h4>
          <p id="yetBalance">$—</p>
          <span>YET Savings Balance</span>
        </div>
        <div class="card">
          <h4>YUSD Price</h4>
          <p>$1.00</p>
          <span>Stable 1:1 Backed</span>
        </div>
        <div class="card">
          <h4>Total Minted</h4>
          <p id="totalMinted">$—</p>
          <span>Live Supply</span>
        </div>
      </div>

      <div class="mint-section">
        <h3>Mint YUSD</h3>
        <input type="text" id="walletAddress" placeholder="Wallet Address" />
        <input type="number" id="usdAmount" placeholder="USD Amount" />
        <button onclick="mintYUSD()">Mint YUSD</button>
        <div id="mintStatus" class="status"></div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
