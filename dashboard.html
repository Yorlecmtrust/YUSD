<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>YUSD Dashboard</title>
</head>
<body>
  <div class="dashboard-container">
    <div class="header">
      <h1>YORLECM EXPRESS TRUST</h1>
      <div id="clock"></div>
      <button onclick="location.href='index.html'">Log Out</button>
    </div>

    <div class="cards">
      <div class="card">
        <h3>YET Balance</h3>
        <p id="loanDiskBalance">$0.00</p>
        <small>YET Savings Balance</small>
      </div>
      <div class="card">
        <h3>YUSD Price</h3>
        <p>$1.00</p>
        <small>Stable 1:1 Backed</small>
      </div>
      <div class="card">
        <h3>Total Minted</h3>
        <p id="totalMinted">$0.00</p>
        <small>Live Supply</small>
      </div>
    </div>

    <div class="mint-section">
      <h2>Mint YUSD</h2>
      <input type="text" id="walletAddress" placeholder="Wallet Address" />
      <input type="number" id="usdAmount" placeholder="USD Amount" />
      <button id="mintBtn">Mint YUSD</button>
      <p id="mintStatus"></p>
      <p id="mintTx"></p>
    </div>

    <div class="ramp-section">
      <h2>Ramp Off</h2>
      <input type="text" id="bankName" placeholder="Bank Name" />
      <input type="text" id="routingNumber" placeholder="Routing Number" />
      <input type="text" id="accountNumber" placeholder="Account Number" />
      <input type="number" id="rampAmount" placeholder="USD Amount" />
      <select id="destinationOption">
        <option value="Personal Bank">Personal Bank</option>
        <option value="Card">Card</option>
        <option value="BitPay Merchant">BitPay Merchant</option>
        <option value="Yorlecm Express Trust">Yorlecm Express Trust (Internal)</option>
      </select>
      <button id="rampBtn">Send Ramp Off</button>
      <p id="rampStatus"></p>
    </div>
  </div>

  <script src="clock.js"></script>
  <script src="script.js"></script>
</body>
</html>
