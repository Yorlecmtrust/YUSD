<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css" />
  <title>YUSD Unified Dashboard</title>
</head>
<body>
  <!-- ✅ LOGIN VIEW -->
  <div class="login-container" id="loginView">
    <div class="login-box">
      <h1>YT</h1>
      <p>YORLECM EXPRESS TRUST</p>
      <p class="subtitle">DECENTRALIZED<br>FINANCIAL<br>INSTITUTION</p>

      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />

      <button id="loginBtn">LOGIN</button>
    </div>
  </div>

  <!-- ✅ DASHBOARD VIEW -->
  <div class="dashboard-container" id="dashboardView" style="display:none;">
    <div class="header">
      <h1>YORLECM EXPRESS TRUST</h1>
      <div id="clock"></div>
      <button id="logoutBtn">Log Out</button>
    </div>

    <div class="cards">
      <div class="card">
        <h3>YET Balance</h3>
        <p id="loanDiskBalance">$0.00</p>
        <small>YET Savings Balance</small>
      </div>
      <div class="card">
        <h3>YUSD Price</h3>
        <p>$1.00</p>
        <small>Stable 1:1 Backed</small>
      </div>
      <div class="card">
        <h3>Total Minted</h3>
        <p id="totalMinted">$0.00</p>
        <small>Live Supply</small>
      </div>
    </div>

    <div class="mint-section">
      <h2>Mint YUSD</h2>
      <input type="text" id="walletAddress" placeholder="Wallet Address" />
      <input type="number" id="usdAmount" placeholder="USD Amount" />
      <button id="mintBtn">Mint YUSD</button>
      <p id="mintStatus"></p>
      <p id="mintTx"></p>
    </div>

    <div class="ramp-section">
      <h2>Ramp Off</h2>
      <input type="text" id="bankName" placeholder="Bank Name" />
      <input type="text" id="routingNumber" placeholder="Routing Number" />
      <input type="text" id="accountNumber" placeholder="Account Number" />
      <input type="number" id="rampAmount" placeholder="USD Amount" />
      <select id="destinationOption">
        <option value="Personal Bank">Personal Bank</option>
        <option value="Card">Card</option>
        <option value="BitPay Merchant">BitPay Merchant</option>
        <option value="Yorlecm Express Trust">Yorlecm Express Trust (Internal)</option>
      </select>
      <button id="rampBtn">Send Ramp Off</button>
      <p id="rampStatus"></p>
    </div>
  </div>

  <script src="clock.js"></script>
  <script>
    // Show clock
    setInterval(() => {
      const now = new Date();
      const clock = document.getElementById("clock");
      if (clock) clock.textContent = now.toLocaleString();
    }, 1000);

    // LOGIN
    document.getElementById("loginBtn").addEventListener("click", function () {
      const email = document.getElementById("username").value;
      const phone = document.getElementById("password").value;

      fetch("http://127.0.0.1:8000/get-user-balance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, phone })
      })
      .then(res => res.json())
      .then(data => {
        if (data.savings_id && data.balance !== undefined) {
          sessionStorage.setItem("savings_id", data.savings_id);
          sessionStorage.setItem("balance", data.balance);
          document.getElementById("loginView").style.display = "none";
          document.getElementById("dashboardView").style.display = "block";
          document.getElementById("loanDiskBalance").textContent = `$${parseFloat(data.balance).toFixed(2)}`;
          fetchTotalMinted();
        } else {
          alert("Login failed. Check your credentials.");
        }
      })
      .catch(err => alert("Server error. Please try again."));
    });

    // LOGOUT
    document.getElementById("logoutBtn").addEventListener("click", function () {
      sessionStorage.clear();
      document.getElementById("dashboardView").style.display = "none";
      document.getElementById("loginView").style.display = "flex";
    });

    // MINT
    document.getElementById("mintBtn").addEventListener("click", function () {
      const wallet = document.getElementById("walletAddress").value;
      const amount = document.getElementById("usdAmount").value;

      fetch("http://127.0.0.1:8000/send-stablecoin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ to_address: wallet, usd_amount: parseFloat(amount) })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("mintStatus").textContent = `✅ Sent ${data.usd_amount} YUSD`;
        document.getElementById("mintTx").textContent = `TX Hash: ${data.tx_hash}`;
        fetchTotalMinted();
      })
      .catch(() => alert("Minting failed."));
    });

    // RAMP OFF
    document.getElementById("rampBtn").addEventListener("click", function () {
      const bank = document.getElementById("bankName").value;
      const routing = document.getElementById("routingNumber").value;
      const account = document.getElementById("accountNumber").value;
      const amount = document.getElementById("rampAmount").value;
      const option = document.getElementById("destinationOption").value;

      fetch("http://127.0.0.1:8000/ramp-off", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          bank_name: bank,
          routing_number: routing,
          account_number: account,
          usd_amount: parseFloat(amount),
          destination_option: option,
          savings_id: sessionStorage.getItem("savings_id")
        })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("rampStatus").textContent = `✅ Ramp off complete: ${data.status}`;
      })
      .catch(() => alert("Ramp off failed."));
    });

    function fetchTotalMinted() {
      fetch("http://127.0.0.1:8000/get-total-minted")
        .then(res => res.json())
        .then(data => {
          document.getElementById("totalMinted").textContent = `$${data.total.toFixed(2)}`;
        });
    }
  </script>
</body>
</html>
